<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hydrant Map">
  <meta name="theme-color" content="#C8102E">
  <title>Hydrant Map</title>
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --red:    #C8102E;
      --dark:   #111111;
      --panel:  #1C1C1E;
      --card:   #2C2C2E;
      --border: #3A3A3C;
      --text:   #FFFFFF;
      --muted:  #8E8E93;
      --h1c: #FF3B30;
      --h2c: #FF9F0A;
      --h3c: #FFD60A;
      --hnc: #0A84FF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--dark);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%; height: 100dvh;
    }

    /* ── Header ── */
    #header {
      background: var(--red);
      padding: 10px 16px;
      padding-top: max(10px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    #header-left { display: flex; align-items: center; gap: 10px; }
    #header h1  { font-size: 17px; font-weight: 800; letter-spacing: 1.5px; }
    #header sub { font-size: 10px; opacity: 0.75; letter-spacing: 0.8px; display: block; margin-top: 1px; }
    #header-right {
      display: flex; align-items: center; gap: 6px;
    }
    #district-badge {
      font-size: 13px; font-weight: 800; letter-spacing: 0.5px;
      background: #FFD400; color: #111;
      padding: 4px 8px; border-radius: 6px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
      display: none;
    }
    #district-badge.show { display: block; }
    #incident-label {
      font-size: 11px; font-weight: 600;
      background: rgba(255,255,255,0.2);
      padding: 4px 8px; border-radius: 6px;
      max-width: 140px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
      display: none;
    }
    #incident-label.show { display: block; }

    /* ── Search bar ── */
    #searchbar {
      background: var(--panel);
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    #addressInput {
      flex: 1; min-width: 0;
      padding: 12px 14px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    #addressInput:focus   { border-color: var(--red); }
    #addressInput::placeholder { color: var(--muted); }
    .btn {
      min-width: 46px; min-height: 46px;
      padding: 0 14px;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #goBtn    { background: var(--red); color: #fff; letter-spacing: 0.5px; }
    #pasteBtn { background: var(--card); color: var(--text); border: 1.5px solid var(--border); font-size: 19px; }
    #locBtn   { background: var(--card); color: var(--text); border: 1.5px solid var(--border); font-size: 19px; }

    /* ── Status bar ── */
    #statusBar {
      background: var(--panel);
      padding: 5px 14px;
      font-size: 12px; color: var(--muted);
      text-align: center; flex-shrink: 0;
      min-height: 24px; line-height: 1.4;
    }

    /* ── Version badge ── */
    #versionBadge {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 4px);
      left: 4px;
      z-index: 9999;
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.4);
      padding: 1px 5px;
      border-radius: 3px;
      pointer-events: none;
      font-family: monospace;
    }

    /* ── Map ── */
    #map { flex: 1; min-height: 0; }

    /* ── Bottom panel ── */
    #panel {
      background: var(--panel);
      border-top: 2px solid var(--red);
      flex-shrink: 0;
      max-height: 46vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      padding-bottom: env(safe-area-inset-bottom);
    }
    #panel.open { transform: translateY(0); }

    #panelHeader {
      padding: 8px 14px;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    #panelTitle  { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; color: var(--muted); text-transform: uppercase; }
    #panelCount  { font-size: 12px; font-weight: 600; color: var(--red); }
    #panelToggle { font-size: 18px; color: var(--muted); transition: transform 0.2s; }
    #panel.collapsed #panelToggle { transform: rotate(180deg); }
    #panel.collapsed #hydrantList { display: none; }

    #hydrantList { overflow-y: auto; flex: 1; max-height: 236px; }

    .h-row {
      display: flex; align-items: center;
      padding: 10px 14px; gap: 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
    }
    .h-row:active { background: var(--card); }

    .badge {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px;
      flex-shrink: 0;
    }
    .b1 { background: var(--h1c); color: #fff; }
    .b2 { background: var(--h2c); color: #000; }
    .b3 { background: var(--h3c); color: #000; }
    .bn { background: var(--hnc); color: #fff; }

    .h-info { flex: 1; min-width: 0; }
    .h-dist {
      font-size: 22px; font-weight: 700; line-height: 1;
      display: flex; align-items: baseline; gap: 6px;
    }
    .h-bearing { font-size: 14px; font-weight: 600; color: var(--muted); }
    .h-meta { font-size: 11px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Loading overlay ── */
    #loading {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 200;
      flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    }
    #loading.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #333; border-top-color: var(--red);
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadMsg { color: #fff; font-size: 14px; font-weight: 500; }

  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="header-left">
      <div>
        <h1>🚒 HYDRANT MAP</h1>
        <sub>BOSTON FIRE DEPARTMENT</sub>
      </div>
    </div>
    <div id="header-right">
      <div id="district-badge"></div>
      <div id="incident-label"></div>
    </div>
  </div>

  <div id="searchbar">
    <input type="text" id="addressInput"
           placeholder="Paste NowForce address…"
           autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false">
    <button class="btn" id="pasteBtn" title="Paste from clipboard">📋</button>
    <button class="btn" id="locBtn"   title="Use my GPS location">📍</button>
    <button class="btn" id="goBtn">GO</button>
  </div>

  <div id="statusBar">Copy address from NowForce → tap 📋 — or tap 📍 for current location</div>

  <div id="map"></div>

  <div id="panel">
    <div id="panelHeader">
      <span id="panelTitle">Nearest Hydrants</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="panelCount"></span>
        <span id="panelToggle">⌃</span>
      </div>
    </div>
    <div id="hydrantList"></div>
  </div>

</div>

<div id="loading">
  <div class="spinner"></div>
  <div id="loadMsg">Loading…</div>
</div>

<script>
// ─────────────────────────────────────────────
//  CONFIG  — replace with your Google Maps key
// ─────────────────────────────────────────────
const GMAPS_KEY      = 'AIzaSyBUNrDmp3zgCmvEyIfsNFek_xf8Z159Vg4';
const ARCGIS_URL     = 'https://gisportal.boston.gov/arcgis/rest/services/PublicSafety/OpenData/MapServer/0/query';
// Boston's own building footprint layer (with roof breaks).
// Same ArcGIS REST pattern as the hydrant layer, hosted by the city.
// Used as a fallback if the local bundle hasn't downloaded yet.
const BUILDINGS_URL  = 'https://gis.bostonplans.org/hosting/rest/services/Boston_Buildings/FeatureServer/9/query';
// Pre-built bundles, hosted alongside the app on GitHub Pages.
// Downloaded once and cached forever in IndexedDB.
// Bump *_BUNDLE_VER to force re-download when a dataset is regenerated.
const BUNDLE_URL          = './boston_buildings.json.gz';
const BUNDLE_VER          = 1;
const HYDRANT_BUNDLE_URL  = './boston_hydrants.json.gz';
const HYDRANT_BUNDLE_VER  = 1;
const DISTRICT_BUNDLE_URL = './boston_districts.json.gz';
const DISTRICT_BUNDLE_VER = 2;
const RADIUS_FEET    = 500;
const BUILDING_RADIUS_FEET = 350;

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let map, geocoder, incidentMarker, infoWindow;
let hydrantMarkers   = [];
let hydrantsData     = [];
let buildingPolygons = [];
let lastLat = null, lastLng = null, lastAddr = '';
let userLocationMarker = null;
let locationWatchId    = null;
// Full Boston building bundle, loaded from gh-pages once and kept in memory.
// Each entry: { b: [minLat, minLng, maxLat, maxLng], r: rings }
let _allBuildings  = null;
let _bundleLoading = null;  // promise while download is in flight
// Same pattern for the hydrant bundle — { i: id, m: model, s: svcArea, y: lat, x: lng }
let _allHydrants          = null;
let _hydrantBundleLoading = null;
let _allDistricts          = null;
let _districtBundleLoading = null;

// ─────────────────────────────────────────────
//  ADDRESS PARSING  (NowForce → geocodable string)
//
//  Input examples:
//    "83 DAKOTA ST DO BSTN, Cross: BOYD ST / GREENBRIER ST"
//    "BHA-WASHINGTON MANOR 1701 WASHINGTON ST BO BSTN, Cross: ..."
//    "MBTA STA-JFK / UMASS 875 COLUMBIA RD DO BSTN"
// ─────────────────────────────────────────────
function parseNowForce(raw) {
  if (!raw || !raw.trim()) return '';
  let addr = raw.split(/,?\s*Cross:/i)[0].trim();
  // Start from the first house number
  const m = addr.match(/\b(\d+\s+\S.+)/);
  if (m) addr = m[1];
  // Strip BFD neighborhood codes
  addr = addr.replace(
    /\b(DO|RX|JP|BO|BR|WR|HP|CH|EB|SB|NE|AL|CB|HI|MV|BB|DT|SO|NB|LY|WE|EG|FH|GE|NI|CI|RO)\b\s*/gi, ''
  );
  // Replace BSTN with Boston MA
  addr = addr.replace(/\bBSTN\b/gi, 'Boston, MA');
  if (!/boston/i.test(addr)) addr += ', Boston, MA';
  return addr.replace(/\s+/g, ' ').replace(/,\s*,/g, ',').trim();
}

function looksLikeNowForce(text) {
  return /\d+.*BSTN/i.test(text);
}

// ─────────────────────────────────────────────
//  DISTANCE & BEARING
// ─────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 20902231; // Earth radius in feet
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getBearing(lat1, lon1, lat2, lon2) {
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const y = Math.sin(dLon) * Math.cos(lat2*Math.PI/180);
  const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) -
            Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  const brng = (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(brng/45) % 8];
}

// ─────────────────────────────────────────────
//  IndexedDB cache (persistent across sessions)
//  Buildings you've already pulled stay on the phone. Each visited
//  block becomes instant on every future call to that area.
// ─────────────────────────────────────────────
const IDB_NAME  = 'bfd-hydrants';
const IDB_STORE = 'buildings';
let _idbPromise = null;

function idbOpen() {
  if (_idbPromise) return _idbPromise;
  _idbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
  return _idbPromise;
}

async function idbGet(key) {
  try {
    const db = await idbOpen();
    return await new Promise(resolve => {
      const tx  = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror   = () => resolve(null);
    });
  } catch(e) { return null; }
}

async function idbPut(key, value) {
  try {
    const db = await idbOpen();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
  } catch(e) { /* ignore */ }
}

// ─────────────────────────────────────────────
//  BUILDING FOOTPRINTS
//  Pulls Boston building polygons within BUILDING_RADIUS_FEET
//  of the incident point. The building containing the incident
//  point is highlighted red; all others are drawn in subtle gray.
//  Cached persistently in IndexedDB — visited blocks draw instantly.
// ─────────────────────────────────────────────
function pointInPolygon(lat, lng, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i].lng, yi = ring[i].lat;
    const xj = ring[j].lng, yj = ring[j].lat;
    const hit = ((yi > lat) !== (yj > lat)) &&
                (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi);
    if (hit) inside = !inside;
  }
  return inside;
}

function drawBuildings(features, lat, lng) {
  buildingPolygons.forEach(p => p.setMap(null));
  buildingPolygons = [];
  features.forEach(f => {
    if (!f.geometry?.rings) return;
    const paths = f.geometry.rings.map(ring =>
      ring.map(([x, y]) => ({ lat: y, lng: x }))
    );
    const isIncidentBldg = paths.some(p => pointInPolygon(lat, lng, p));

    const polygon = new google.maps.Polygon({
      paths,
      map,
      fillColor:    isIncidentBldg ? '#FF3B30' : '#777777',
      fillOpacity:  isIncidentBldg ? 0.40 : 0.18,
      strokeColor:  isIncidentBldg ? '#FF3B30' : '#9A9A9A',
      strokeWeight: isIncidentBldg ? 2 : 1,
      strokeOpacity: isIncidentBldg ? 0.95 : 0.55,
      clickable: false,
      zIndex:    isIncidentBldg ? 100 : 50,
    });
    buildingPolygons.push(polygon);
  });
}

// Ensure the city-wide bundle is loaded. Returns true on success, false if
// download fails (caller falls back to live per-area API).
async function ensureBundleLoaded() {
  if (_allBuildings) return true;
  if (_bundleLoading) return _bundleLoading;

  _bundleLoading = (async () => {
    // 1. Try IndexedDB
    const idbKey = `bundle_v${BUNDLE_VER}`;
    const cached = await idbGet(idbKey);
    if (cached && Array.isArray(cached) && cached.length > 1000) {
      _allBuildings = cached;
      console.log(`Buildings bundle loaded from IDB: ${cached.length} features`);
      return true;
    }

    // 2. Download from GitHub Pages (one-time, ~7 MB gzipped)
    showLoad('Downloading Boston buildings (one-time, ~7 MB)…');
    try {
      const r = await fetch(BUNDLE_URL);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      // Stream + native gzip decode, then JSON parse
      const decoded = r.body.pipeThrough(new DecompressionStream('gzip'));
      const features = await new Response(decoded).json();
      _allBuildings = features;
      idbPut(idbKey, features);
      console.log(`Bundle fetched: ${features.length} features`);
      hideLoad();
      return true;
    } catch(e) {
      console.warn('Bundle download failed; will fall back to live API.', e);
      hideLoad();
      return false;
    }
  })();

  const ok = await _bundleLoading;
  _bundleLoading = null;
  return ok;
}

// Live-API fallback (also used the first time before bundle finishes loading)
async function loadBuildingsLive(lat, lng) {
  const cacheKey = `live_${lat.toFixed(4)}_${lng.toFixed(4)}_${BUILDING_RADIUS_FEET}`;
  const cached = await idbGet(cacheKey);
  if (cached) { drawBuildings(cached, lat, lng); return; }

  const params = new URLSearchParams({
    geometry:       JSON.stringify({ x: lng, y: lat, spatialReference: { wkid: 4326 } }),
    geometryType:   'esriGeometryPoint',
    inSR:           '4326',
    spatialRel:     'esriSpatialRelIntersects',
    distance:       BUILDING_RADIUS_FEET,
    units:          'esriSRUnit_Foot',
    outFields:      'OBJECTID',
    returnGeometry: true,
    outSR:          '4326',
    f:              'json',
  });
  let data;
  try {
    const r = await fetch(`${BUILDINGS_URL}?${params}`);
    data = await r.json();
  } catch(e) { console.warn('Buildings live fetch failed:', e); return; }
  if (!data.features?.length) return;
  drawBuildings(data.features, lat, lng);
  idbPut(cacheKey, data.features);
}

async function loadBuildings(lat, lng) {
  const ok = await ensureBundleLoaded();
  if (!ok) {
    // Bundle unavailable — fall back to per-area live fetch
    return loadBuildingsLive(lat, lng);
  }

  // Bbox of search area (rough conversion: 1 deg lat ≈ 364,000 ft)
  const dLat = BUILDING_RADIUS_FEET / 364000;
  const dLng = dLat / Math.cos(lat * Math.PI / 180);
  const minLat = lat - dLat, maxLat = lat + dLat;
  const minLng = lng - dLng, maxLng = lng + dLng;

  // Brute-force bbox filter — ~50 ms for 128K features on modern phones
  const matches = [];
  for (let i = 0; i < _allBuildings.length; i++) {
    const f = _allBuildings[i];
    const b = f.b;
    if (b[2] < minLat || b[0] > maxLat || b[3] < minLng || b[1] > maxLng) continue;
    matches.push({ geometry: { rings: f.r } });
  }
  drawBuildings(matches, lat, lng);
}

// Kick off bundle downloads as soon as the app boots so users don't
// see a spinner the first time they search. Runs concurrently in the
// background; lookups are instant once both finish.
function preloadBundle() {
  ensureBundleLoaded();
  ensureHydrantsBundleLoaded();
  ensureDistrictsBundleLoaded();
}

// ─────────────────────────────────────────────
//  DISTRICT BUNDLE — 9 BFD fire districts, ~38 KB gzipped
// ─────────────────────────────────────────────
async function ensureDistrictsBundleLoaded() {
  if (_allDistricts) return true;
  if (_districtBundleLoading) return _districtBundleLoading;

  _districtBundleLoading = (async () => {
    const idbKey = `districts_v${DISTRICT_BUNDLE_VER}`;
    const cached = await idbGet(idbKey);
    if (cached && Array.isArray(cached) && cached.length > 0) {
      _allDistricts = cached;
      console.log(`District bundle loaded from IDB: ${cached.length} districts`);
      return true;
    }
    try {
      const r = await fetch(DISTRICT_BUNDLE_URL);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const decoded = r.body.pipeThrough(new DecompressionStream('gzip'));
      const districts = await new Response(decoded).json();
      _allDistricts = districts;
      idbPut(idbKey, districts);
      console.log(`District bundle fetched: ${districts.length} districts`);
      return true;
    } catch(e) {
      console.warn('District bundle download failed; district badge unavailable.', e);
      return false;
    }
  })();

  const ok = await _districtBundleLoading;
  _districtBundleLoading = null;
  return ok;
}

// Point-in-polygon (ray casting) for [lng, lat] rings.
function _pointInRing(lat, lng, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const [xi, yi] = ring[i], [xj, yj] = ring[j];
    const intersect = ((yi > lat) !== (yj > lat)) &&
      (lng < (xj - xi) * (lat - yi) / (yj - yi || 1e-12) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

// Find the BFD district that contains the given point. Returns the district
// number or null if the point is outside all districts (or bundle not loaded).
function findDistrict(lat, lng) {
  if (!_allDistricts) return null;
  for (const d of _allDistricts) {
    const [minLat, minLng, maxLat, maxLng] = d.b;
    if (lat < minLat || lat > maxLat || lng < minLng || lng > maxLng) continue;
    // Multi-ring polygon: outer ring contains, inner rings exclude (holes).
    // For simple BFD districts there should only be a single outer ring per
    // polygon, but handle the general case anyway.
    let hits = 0;
    for (const ring of d.r) {
      if (_pointInRing(lat, lng, ring)) hits++;
    }
    if (hits % 2 === 1) return d.d;
  }
  return null;
}

// ─────────────────────────────────────────────
//  HYDRANT BUNDLE — every Boston hydrant in 167 KB gzipped
// ─────────────────────────────────────────────
async function ensureHydrantsBundleLoaded() {
  if (_allHydrants) return true;
  if (_hydrantBundleLoading) return _hydrantBundleLoading;

  _hydrantBundleLoading = (async () => {
    const idbKey = `hydrants_v${HYDRANT_BUNDLE_VER}`;
    const cached = await idbGet(idbKey);
    if (cached && Array.isArray(cached) && cached.length > 1000) {
      _allHydrants = cached;
      console.log(`Hydrant bundle loaded from IDB: ${cached.length} hydrants`);
      return true;
    }
    try {
      const r = await fetch(HYDRANT_BUNDLE_URL);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const decoded = r.body.pipeThrough(new DecompressionStream('gzip'));
      const hydrants = await new Response(decoded).json();
      _allHydrants = hydrants;
      idbPut(idbKey, hydrants);
      console.log(`Hydrant bundle fetched: ${hydrants.length} hydrants`);
      return true;
    } catch(e) {
      console.warn('Hydrant bundle download failed; will fall back to live API.', e);
      return false;
    }
  })();

  const ok = await _hydrantBundleLoading;
  _hydrantBundleLoading = null;
  return ok;
}

// Filter the in-memory bundle to hydrants within RADIUS_FEET of (lat, lng).
// Returns an array shaped like the live API response so showHydrants can
// process it identically.
function filterHydrantsBundle(lat, lng) {
  const dLat = RADIUS_FEET / 364000;
  const dLng = dLat / Math.cos(lat * Math.PI / 180);
  const minLat = lat - dLat, maxLat = lat + dLat;
  const minLng = lng - dLng, maxLng = lng + dLng;
  const matches = [];
  for (let i = 0; i < _allHydrants.length; i++) {
    const h = _allHydrants[i];
    if (h.y < minLat || h.y > maxLat || h.x < minLng || h.x > maxLng) continue;
    const dist = haversine(lat, lng, h.y, h.x);
    if (dist > RADIUS_FEET) continue;
    matches.push({
      id:      h.i || '—',
      model:   h.m || '',
      svcArea: h.s || '',
      lat:     h.y,
      lng:     h.x,
      dist,
      dir:     getBearing(lat, lng, h.y, h.x),
    });
  }
  return matches.sort((a, b) => a.dist - b.dist);
}

// Live-API hydrant fallback (returns same shape as filterHydrantsBundle)
async function fetchHydrantsLive(lat, lng) {
  const params = new URLSearchParams({
    geometry: JSON.stringify({ x: lng, y: lat, spatialReference: { wkid: 4326 } }),
    geometryType:  'esriGeometryPoint',
    inSR:          '4326',
    spatialRel:    'esriSpatialRelIntersects',
    distance:      RADIUS_FEET,
    units:         'esriSRUnit_Foot',
    outFields:     'FACILITY_I,HYDRANT_MO,SERVICE_AR',
    returnGeometry: true,
    outSR:         '4326',
    f:             'json',
  });
  const r = await fetch(`${ARCGIS_URL}?${params}`);
  const data = await r.json();
  if (!data.features?.length) return [];
  return data.features.map(f => {
    const hLat = f.geometry?.y, hLng = f.geometry?.x;
    return {
      id:      f.attributes.FACILITY_I || '—',
      model:   f.attributes.HYDRANT_MO || '',
      svcArea: f.attributes.SERVICE_AR || '',
      lat: hLat, lng: hLng,
      dist: haversine(lat, lng, hLat, hLng),
      dir:  getBearing(lat, lng, hLat, hLng),
    };
  }).filter(h => h.lat && h.lng).sort((a, b) => a.dist - b.dist);
}

async function findHydrantsNear(lat, lng) {
  const ok = await ensureHydrantsBundleLoaded();
  if (ok) return filterHydrantsBundle(lat, lng);
  return fetchHydrantsLive(lat, lng);
}

// ─────────────────────────────────────────────
//  CLIPBOARD PASTE
// ─────────────────────────────────────────────
async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (!text) { setStatus('Clipboard is empty'); return; }
    document.getElementById('addressInput').value = text;
    search();
  } catch(e) {
    // Fallback: focus input so user can manually paste
    const inp = document.getElementById('addressInput');
    inp.focus();
    setStatus('Tap the address field and long-press → Paste');
  }
}

// ─────────────────────────────────────────────
//  GPS LOCATION
// ─────────────────────────────────────────────
function useLocation() {
  if (!navigator.geolocation) { setStatus('Geolocation not available'); return; }
  showLoad('Getting your location…');
  navigator.geolocation.getCurrentPosition(
    pos => {
      hideLoad();
      document.getElementById('addressInput').value = '';
      // Reverse-geocode the GPS fix to get a real street name. Skip clipboard
      // preference — GPS button is an explicit "where am I" action, not a
      // response to a NowForce dispatch.
      runLatLngSearch(`${pos.coords.latitude},${pos.coords.longitude}`, { useClipboard: false });
    },
    () => { hideLoad(); setStatus('Location access denied — check phone settings'); },
    { enableHighAccuracy: true, timeout: 12000 }
  );
}

// ─────────────────────────────────────────────
//  MAIN SEARCH
// ─────────────────────────────────────────────
function search() {
  const raw = document.getElementById('addressInput').value.trim();
  if (!raw) return;
  const llMatch = raw.match(/^\s*(-?\d{1,3}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)\s*$/);
  if (llMatch) {
    runLatLngSearch(`${llMatch[1]},${llMatch[2]}`);
    return;
  }
  const addr = parseNowForce(raw);
  showLoad('Locating ' + addr + '…');
  geocoder.geocode({ address: addr, region: 'us' }, (results, status) => {
    if (status !== 'OK' || !results.length) {
      hideLoad();
      setStatus('Address not found — try removing the building name');
      return;
    }
    const loc = results[0].geometry.location;
    // Strip ", Boston, MA, USA" tail before display (parseNowForce adds it
    // for the geocoder, but it's noise in the UI).
    const display = prettifyAddress(addr);
    document.getElementById('addressInput').value = display;
    showHydrants(loc.lat(), loc.lng(), display);
  });
}

// Reverse-geocode lat,lng → prefer street_address result, fall back to first
// result. Hides raw coords from the user; populates input with the resolved
// street address once Google responds.
//
// If the clipboard contains a NowForce-style address (the user typically has
// the dispatch text copied right before tapping "open with…"), prefer THAT
// for the display label — Google's reverse-geocoder often returns a nearby
// but wrong building when multiple addresses share a corner. The lat/lng
// from NowForce is still used for the map center / hydrant query, so the pin
// stays exact even when the label comes from clipboard text.
async function runLatLngSearch(latlng, opts = {}) {
  const useClipboard = opts.useClipboard !== false;  // default true
  const [latStr, lngStr] = latlng.split(',');
  const lat = parseFloat(latStr), lng = parseFloat(lngStr);
  showLoad('Looking up address…');

  // Try the clipboard first — async, but cheap if the user already copied
  // the dispatch. Skipped for GPS button (no NowForce context).
  let clipLabel = null;
  if (useClipboard) {
    try {
      if (navigator.clipboard && navigator.clipboard.readText) {
        const text = await navigator.clipboard.readText();
        if (text && looksLikeNowForce(text)) {
          clipLabel = parseNowForce(text);
        }
      }
    } catch(e) { /* permission denied or no clipboard — fall back to geocode */ }
  }

  if (clipLabel) {
    document.getElementById('addressInput').value = prettifyAddress(clipLabel);
    showHydrants(lat, lng, prettifyAddress(clipLabel));
    return;
  }

  // No usable clipboard text — reverse-geocode the coords.
  geocoder.geocode({ location: { lat, lng } }, (results, status) => {
    let label = latlng;
    if (status === 'OK' && results.length) {
      const best =
        results.find(r => r.types && r.types.includes('street_address')) ||
        results.find(r => r.types && r.types.includes('premise')) ||
        results[0];
      label = prettifyAddress(best.formatted_address || latlng);
    }
    document.getElementById('addressInput').value = label;
    showHydrants(lat, lng, label);
  });
}

// Strip "Boston, MA <ZIP>, USA" tail from any address string. The app is
// Boston-only, so city/state/country/zip are noise. Keeps any building name
// that comes before the street ("Logan International Airport, ...",
// "Boston Common, 139 Tremont St").
function prettifyAddress(s) {
  if (!s) return s;
  // 1) Cut at first ", Boston" boundary if present (most common path)
  let cut = s.split(/,\s*Boston\b/i)[0];
  // 2) If nothing was cut, peel off trailing MA / USA / ZIP / Boston tokens
  if (cut === s) {
    const parts = s.split(',').map(p => p.trim()).filter(Boolean);
    while (parts.length > 1) {
      const last = parts[parts.length - 1];
      if (/^(boston|ma|massachusetts|usa|united\s+states|\d{5}(-\d{4})?)$/i.test(last)) {
        parts.pop();
      } else break;
    }
    cut = parts.join(', ');
  }
  return cut.trim();
}

// ─────────────────────────────────────────────
//  CORE: show incident + hydrants on map
// ─────────────────────────────────────────────
async function showHydrants(lat, lng, label) {
  showLoad('Loading hydrants…');
  lastLat = lat; lastLng = lng; lastAddr = label;

  map.setCenter({ lat, lng });
  map.setZoom(17);

  // Incident marker
  if (incidentMarker) incidentMarker.setMap(null);
  incidentMarker = new google.maps.Marker({
    position: { lat, lng }, map,
    title: label,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 16,
      fillColor: '#C8102E',
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 3,
    },
    label: { text: '🔥', fontSize: '14px' },
    zIndex: 1000,
  });
  incidentMarker.addListener('click', () => showIncidentInfo(lat, lng, label));

  // Header label + separate district badge
  const shortLabel = label.length > 35 ? label.slice(0, 34) + '…' : label;
  const hdr = document.getElementById('incident-label');
  hdr.textContent = shortLabel;
  hdr.classList.add('show');

  const badge = document.getElementById('district-badge');
  const setDistrict = (d) => {
    if (d == null) {
      badge.classList.remove('show');
      badge.textContent = '';
    } else {
      badge.textContent = `D${d}`;
      badge.classList.add('show');
    }
  };
  setDistrict(findDistrict(lat, lng));
  // If bundle wasn't loaded yet, retry once it lands
  if (!badge.classList.contains('show')) {
    ensureDistrictsBundleLoaded().then(ok => {
      if (!ok) return;
      setDistrict(findDistrict(lat, lng));
    });
  }

  // Clear old hydrant markers
  hydrantMarkers.forEach(m => m.setMap(null));
  hydrantMarkers = [];
  if (infoWindow) infoWindow.close();

  // Kick off building footprint draw in parallel — non-blocking
  loadBuildings(lat, lng);

  // Find hydrants — uses local bundle if loaded, falls back to live API
  let hydrants;
  try {
    hydrants = await findHydrantsNear(lat, lng);
  } catch(e) {
    hideLoad();
    setStatus('⚠️  Could not load hydrant data — check connection');
    return;
  }
  hideLoad();

  if (!hydrants.length) {
    setStatus(`⚠️  No hydrants found within ${RADIUS_FEET} ft`);
    document.getElementById('panel').classList.remove('open');
    return;
  }
  hydrantsData = hydrants;

  // Map markers
  const COLORS  = ['#FF3B30','#FF9F0A','#FFD60A','#0A84FF'];
  const TCOLORS = ['#fff',   '#000',   '#000',   '#fff'];

  hydrants.forEach((h, i) => {
    const color  = COLORS[Math.min(i, 3)];
    const tcolor = TCOLORS[Math.min(i, 3)];
    const marker = new google.maps.Marker({
      position: { lat: h.lat, lng: h.lng }, map,
      title: `#${i+1} — ${Math.round(h.dist)} ft ${h.dir}`,
      label: { text: String(i+1), color: tcolor, fontWeight: 'bold', fontSize: '13px' },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: i < 3 ? 15 : 11,
        fillColor: color, fillOpacity: 1,
        strokeColor: tcolor, strokeWeight: 2,
      },
      zIndex: 500 - i,
    });
    marker.addListener('click', () => {
      scrollToRow(i);
      showHydrantInfo(marker, h, i);
    });
    hydrantMarkers.push(marker);
  });

  // Panel list
  const BADGES = ['b1','b2','b3','bn'];
  document.getElementById('hydrantList').innerHTML = hydrants.map((h, i) => {
    const bc   = BADGES[Math.min(i, 3)];
    const meta = [h.id, h.model, h.svcArea].filter(Boolean).join(' · ');
    return `
      <div class="h-row" id="hrow-${i}" onclick="panToHydrant(${i},${h.lat},${h.lng})">
        <div class="badge ${bc}">${i+1}</div>
        <div class="h-info">
          <div class="h-dist">
            ${Math.round(h.dist)} ft
            <span class="h-bearing">${h.dir}</span>
          </div>
          <div class="h-meta">${meta || 'No details available'}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('panelCount').textContent = `${hydrants.length} within ${RADIUS_FEET} ft`;
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel').classList.remove('collapsed');

  const nearest = hydrants[0];
  setStatus(`Nearest: ${Math.round(nearest.dist)} ft ${nearest.dir} · ${hydrants.length} total within ${RADIUS_FEET} ft`);
}

// ─────────────────────────────────────────────
//  INFO WINDOWS
// ─────────────────────────────────────────────
function showIncidentInfo(lat, lng, label) {
  if (!infoWindow) infoWindow = new google.maps.InfoWindow();
  infoWindow.setContent(`
    <div style="font-family:-apple-system,sans-serif;padding:4px 2px;min-width:180px">
      <div style="font-weight:700;font-size:14px">📍 ${label}</div>
    </div>`);
  infoWindow.open(map, incidentMarker);
}

function showHydrantInfo(marker, h, i) {
  if (!infoWindow) infoWindow = new google.maps.InfoWindow();
  if (!h) h = hydrantsData[i] || null;
  if (!h) { infoWindow.open(map, marker); return; }
  const meta = [h.model, h.svcArea].filter(Boolean).join(' · ');
  infoWindow.setContent(`
    <div style="font-family:-apple-system,sans-serif;padding:4px 2px;min-width:160px">
      <div style="font-weight:700;font-size:14px">Hydrant #${i+1}</div>
      <div style="font-size:13px;margin:4px 0;color:#555">
        ${Math.round(h.dist)} ft ${h.dir} · ID: ${h.id}
      </div>
      ${meta ? `<div style="font-size:11px;color:#777">${meta}</div>` : ''}
    </div>`);
  infoWindow.open(map, marker);
}

// ─────────────────────────────────────────────
//  PANEL CONTROLS
// ─────────────────────────────────────────────
function panToHydrant(i, lat, lng) {
  map.panTo({ lat, lng });
  if (map.getZoom() < 18) map.setZoom(18);
  showHydrantInfo(hydrantMarkers[i], hydrantsData[i] || null, i);
}

function scrollToRow(i) {
  const el = document.getElementById(`hrow-${i}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

document.getElementById('panelHeader').addEventListener('click', () => {
  document.getElementById('panel').classList.toggle('collapsed');
});

// ─────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────
function setStatus(msg) { document.getElementById('statusBar').textContent = msg; }
function showLoad(msg)  { document.getElementById('loadMsg').textContent = msg; document.getElementById('loading').classList.add('show'); }
function hideLoad()     { document.getElementById('loading').classList.remove('show'); }

// ─────────────────────────────────────────────
//  GOOGLE MAPS INIT
// ─────────────────────────────────────────────
window.initMap = function() {
  geocoder = new google.maps.Geocoder();
  infoWindow = new google.maps.InfoWindow();

  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 42.3601, lng: -71.0589 },
    zoom: 13,
    disableDefaultUI: true,
    zoomControl: true,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER },
    gestureHandling: 'greedy',
    styles: [
      { elementType:'geometry',              stylers:[{color:'#242f3e'}] },
      { elementType:'labels.text.stroke',    stylers:[{color:'#242f3e'}] },
      { elementType:'labels.text.fill',      stylers:[{color:'#746855'}] },
      { featureType:'road',                  elementType:'geometry',       stylers:[{color:'#38414e'}] },
      { featureType:'road',                  elementType:'geometry.stroke',stylers:[{color:'#212a37'}] },
      { featureType:'road',                  elementType:'labels.text.fill',stylers:[{color:'#9ca5b3'}] },
      { featureType:'road.highway',          elementType:'geometry',       stylers:[{color:'#746855'}] },
      { featureType:'road.highway',          elementType:'geometry.stroke',stylers:[{color:'#1f2835'}] },
      { featureType:'road.highway',          elementType:'labels.text.fill',stylers:[{color:'#f3d19c'}] },
      { featureType:'water',                 elementType:'geometry',       stylers:[{color:'#17263c'}] },
      { featureType:'water',                 elementType:'labels.text.fill',stylers:[{color:'#515c6d'}] },
      { featureType:'poi',                   stylers:[{visibility:'off'}] },
      { featureType:'transit',               stylers:[{visibility:'off'}] },
    ],
  });

  // ── Event listeners ──
  document.getElementById('goBtn').addEventListener('click', search);
  document.getElementById('pasteBtn').addEventListener('click', pasteClipboard);
  document.getElementById('locBtn').addEventListener('click', useLocation);
  document.getElementById('addressInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); search(); }
  });

  // ── Preload the city-wide building bundle in the background ──
  // First launch downloads ~10 MB; cached forever after. Runs concurrently
  // with map setup so the user never sees a blocking spinner unless they
  // search before the download completes.
  preloadBundle();

  // ── Live GPS blue dot ──
  // Starts automatically — no button press needed.
  // Updates continuously as the user moves toward the incident.
  if (navigator.geolocation) {
    locationWatchId = navigator.geolocation.watchPosition(
      pos => {
        const ulat = pos.coords.latitude;
        const ulng = pos.coords.longitude;
        if (!userLocationMarker) {
          userLocationMarker = new google.maps.Marker({
            position: { lat: ulat, lng: ulng },
            map,
            title: 'Your location',
            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              scale: 10,
              fillColor: '#1A73E8',
              fillOpacity: 1,
              strokeColor: '#ffffff',
              strokeWeight: 3,
            },
            zIndex: 2000,
          });
        } else {
          userLocationMarker.setPosition({ lat: ulat, lng: ulng });
        }
      },
      () => { /* location permission denied — no dot shown */ },
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
  }

  // ── URL param support ──
  // Deep-link from iOS Shortcut: https://yourapp.com/?address=83+DAKOTA+ST+DO+BSTN
  // GPS shortcut from manifest:  https://yourapp.com/?gps=1
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('gps') === '1') { useLocation(); return; }
  const urlAddr = urlParams.get('address') || urlParams.get('q') || urlParams.get('a');
  if (urlAddr) {
    // If the deep-link is raw lat,lng (e.g. NowForce TWA → ?address=42.33,-71.08)
    // hide the coords from the user — search runs internally, input populates
    // with the reverse-geocoded street address once Google responds.
    const isLatLng = /^-?\d{1,3}\.\d+\s*,\s*-?\d{1,3}\.\d+$/.test(urlAddr.trim());
    document.getElementById('addressInput').value = isLatLng ? '' : urlAddr;
    if (isLatLng) {
      runLatLngSearch(urlAddr.trim());
    } else {
      search();
    }
    return;
  }

  // ── Auto-read clipboard ──
  // Reads clipboard and auto-searches if it looks like a street address.
  // Only fires when the input is empty so it never clobbers a manual search.
  async function tryClipboard() {
    try {
      const text = await navigator.clipboard.readText();
      if (!text) return;
      const input = document.getElementById('addressInput');
      if (input.value.trim()) return;          // don't overwrite manual entry
      input.value = text;
      if (looksLikeNowForce(text) || /^\d{1,5}\s+[A-Za-z]/i.test(text.trim())) {
        search();
      }
    } catch(e) { /* permission denied or doc not focused — silently skip */ }
  }

  // Try on initial load (works on desktop when page already has focus)
  setTimeout(tryClipboard, 400);

  // Key fix for Android: re-try every time the user switches back to this app
  // (copy address in NowForce → switch to hydrant map → visibilitychange fires)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) setTimeout(tryClipboard, 150);
  });
  window.addEventListener('focus', () => setTimeout(tryClipboard, 150));
};

(function() {
  const s = document.createElement('script');

  s.async = true; s.defer = true;

if ('serviceWorker' in navigator) {

    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ─────────────────────────────────────────────
//  DYNAMIC APPLE TOUCH ICON (canvas-generated)
// ─────────────────────────────────────────────
(function() {
  try {
    const c = document.createElement('canvas');
    c.width = c.height = 180;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#C8102E';
    if (ctx.roundRect) ctx.roundRect(0,0,180,180,32);
    else { ctx.beginPath(); ctx.rect(0,0,180,180); }
    ctx.fill();
    ctx.font = '90px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🚒', 90, 95);
    const link = document.createElement('link');
    link.rel = 'apple-touch-icon';
    link.href = c.toDataURL('image/png');
    document.head.appendChild(link);
  } catch(e) {}
})();

(function(){
  const ver = 'v25';
  const el = document.createElement('div');
  el.id = 'versionBadge';
  el.textContent = ver;
  document.body.appendChild(el);
})();
