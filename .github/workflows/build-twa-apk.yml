name: Build TWA APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'twa/**'
      - '.github/workflows/build-twa-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install --silent

      - name: Configure Bubblewrap (skip JDK/SDK install prompts)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {"jdkPath":"$JAVA_HOME","androidSdkPath":"$ANDROID_HOME"}
          EOF
          cat ~/.bubblewrap/config.json
          # Bubblewrap validates SDK by checking for a `tools` or `bin` folder at root.
          # Newer cmdline-tools layout puts these under cmdline-tools/latest/ — symlink it.
          if [ ! -e "$ANDROID_HOME/tools" ] && [ -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            ln -s "$ANDROID_HOME/cmdline-tools/latest" "$ANDROID_HOME/tools"
          fi
          ls "$ANDROID_HOME"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android.keystore

      - name: Build APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./node_modules/.bin/bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bfd-hydrants-apk
          path: |
            twa/app-release-signed.apk
            twa/app-release-bundle.aab
          if-no-files-found: warn
